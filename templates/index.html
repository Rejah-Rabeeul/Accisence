<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accisence - AI Road Safety</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>🛡️ Accisence</h1>
            <p>AI-Powered Accident Prediction & Safe Navigation</p>
        </header>

        <div class="grid">
            <div class="sidebar">
                <div class="card">
                    <h3>📍 Journey Planner</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">Plan the shortest and
                        safest route.</p>

                    <div class="form-group">
                        <label>Origin</label>
                        <input type="text" id="origin" placeholder="Current Location">
                    </div>

                    <div class="form-group">
                        <label>Destination</label>
                        <input type="text" id="destination" placeholder="e.g. Calicut Beach">
                    </div>

                    <button id="analyzeBtn" class="btn">Analyze Route Risk</button>

                    <div id="status" class="status-bar hidden">
                        <div class="loader"></div> <span id="statusText">Analyzing...</span>
                    </div>
                </div>

                <div id="resultsCard" class="card hidden" style="margin-top: 20px;">
                    <div id="overallRiskSection"
                        style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <h3 style="margin-bottom: 5px;">🌍 Overall Route Risk</h3>
                        <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">
                            Status: <span id="overallRiskLevel" class="risk-tag">Unknown</span>
                        </div>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">
                            Driving Conditions: <span id="routeConditions">...</span>
                        </p>
                    </div>

                    <h3>🚨 High Risk Hotspots</h3>
                    <div id="hotspotList" style="margin-top: 15px;"></div>

                    <a id="gmapsLink" href="#" target="_blank" class="gmaps-link btn"
                        style="background: #4285F4; margin-top: 15px;">
                        🚀 Open in Google Maps
                    </a>

                    <button id="notifyBtn" class="btn"
                        style="background: var(--warning); color: black; margin-top: 15px;">
                        🔔 Show Device Notification
                    </button>
                </div>
            </div>

            <div class="main-content">
                <div id="map"></div>

                <div class="card" style="margin-top: 20px;">
                    <h3>📡 Location Services</h3>
                    <p id="locStatus" style="color: var(--text-muted); margin-bottom: 10px;">Waiting for GPS...</p>
                    <button id="getLocBtn" class="btn"
                        style="background: rgba(255,255,255,0.1); color: white; width: auto; padding: 10px 20px;">
                        📍 Refresh GPS
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
