<!DOCTYPE html>
<html>
<head>
    <title>Notification Test</title>
</head>
<body>
    <h1>Web Push Notification Test</h1>
    <button onclick="testNotification()">Trigger Local Notification</button>
    <div id="log"></div>

    <script>
        function logMsg(msg) {
            document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
            console.log(msg);
        }

        function testNotification() {
            if (!("Notification" in window)) {
                logMsg("This browser does not support desktop notification");
                alert("Browser doesn't support notifications");
            } else if (Notification.permission === "granted") {
                logMsg("Permission already granted. Showing notification.");
                new Notification("Test Granted!");
            } else if (Notification.permission !== "denied") {
                logMsg("Requesting permission...");
                Notification.requestPermission().then(function (permission) {
                    logMsg("Permission received: " + permission);
                    if (permission === "granted") {
                        new Notification("Test Request Granted!");
                    }
                });
            } else {
                logMsg("Permission was explicitly denied by the user previously.");
                alert("Please go into site settings and allow notifications for this page.");
            }
        }
    </script>
</body>
</html>
